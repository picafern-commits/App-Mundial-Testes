name: Deploy Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy hosting, functions and rules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Create Firebase service account file
        run: |
          cat > "$RUNNER_TEMP/firebase-service-account.json" <<'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          EOF

      - name: Create functions env file
        run: |
          printf "FOOTBALL_DATA_TOKEN=%s\n" "${{ secrets.FOOTBALL_DATA_TOKEN }}" > functions/.env

      - name: Install functions dependencies
        run: npm install
        working-directory: functions

      - name: Validate app JavaScript
        run: node --input-type=module --check < app.js

      - name: Validate functions JavaScript
        run: node --check functions/index.js

      - name: Deploy Firebase
        run: firebase deploy --only functions --project "${{ vars.FIREBASE_PROJECT_ID }}" --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
