name: Deploy Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install Functions dependencies
        working-directory: functions
        run: npm install

      - name: Create Firebase service account file
        run: |
          cat > "$RUNNER_TEMP/firebase-service-account.json" <<'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          EOF

      - name: Set Functions artifacts cleanup policy
        run: |
          firebase functions:artifacts:setpolicy --location us-central1 --days 1 --force --project app-mundial2026 || true
          firebase functions:artifacts:setpolicy --location europe-west1 --days 1 --force --project app-mundial2026 || true
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json

      - name: Deploy Functions and Firestore rules
        run: |
          set +e
          firebase deploy --only functions,firestore:rules --project app-mundial2026 --force 2>&1 | tee firebase-deploy.log
          deploy_status=${PIPESTATUS[0]}
          set -e

          if [ "$deploy_status" -eq 0 ]; then
            exit 0
          fi

          if grep -q "Functions successfully deployed but could not set up cleanup policy" firebase-deploy.log; then
            firebase functions:artifacts:setpolicy --location us-central1 --days 1 --force --project app-mundial2026 || true
            firebase functions:artifacts:setpolicy --location europe-west1 --days 1 --force --project app-mundial2026 || true
            echo "Functions deployed. Cleanup policy setup failed after deploy, but it was handled as non-blocking."
            exit 0
          fi

          exit "$deploy_status"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
